<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Signal Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="section" style="min-height: 100vh; display: grid; place-items: center;">
        <section class="launch-panel reveal is-visible" style="max-width: 42rem;">
          <div>
            <p class="eyebrow">404</p>
            <h1 style="font-size: clamp(2.5rem, 8vw, 4.5rem);">This page drifted off course.</h1>
          </div>
          <div>
            <p class="lede" style="margin-top: 0;">
              The file or route you asked for does not exist in this GitHub
              Pages site yet.
            </p>
            <a class="button button-primary" href="index.html">Back home</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
